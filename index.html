<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Lobby</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: #0f0f0f; color: #e0e0e0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
    .card { width: 100%; max-width: 450px; background: #1a1a1a; padding: 20px; margin-top: 50px; border-radius: 12px; height: 80vh; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
    
    /* Room List Styling */
    #room-list-ul { list-style: none; padding: 0; flex-grow: 1; overflow-y: auto; }
    .room-item { padding: 15px; background: #252525; margin-bottom: 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
    .room-item:hover { background: #333; border-color: #4dabf7; }

    /* Plus Button */
    .fab { position: absolute; bottom: 20px; right: 20px; width: 50px; height: 50px; background: #4dabf7; color: white; border: none; border-radius: 50%; font-size: 24px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; justify-content: center; align-items: center; }
    .fab:hover { background: #339af0; }

    /* Forms */
    input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; outline: none;}
    input:focus { border-color: #4dabf7; }
    .btn-main { width: 100%; padding: 12px; background: #4dabf7; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 10px;}
    .btn-main:hover { background: #339af0; }
    .btn-secondary { width: 100%; padding: 12px; background: transparent; color: #888; border: none; cursor: pointer; }
    .btn-secondary:hover { color: white; }

    /* Chat Styling */
    .chat-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 10px; }
    .header-btns button { padding: 6px 12px; font-size: 14px; margin-left: 5px; background: #333; color: white; border: none; border-radius: 4px; cursor: pointer;}
    .header-btns button:hover { background: #444; }
    
    #messages { flex-grow: 1; list-style: none; padding: 0; overflow-y: auto; margin-bottom: 15px;}
    #messages li { padding: 8px 0; border-bottom: 1px solid #252525; word-wrap: break-word;}
    #messages li strong { color: #4dabf7; margin-right: 5px;}
    
    .input-group { display: flex; gap: 10px; }
    .input-group input { margin-bottom: 0; }
    .input-group button { width: auto; padding: 0 20px; background: #4dabf7; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="view-list" class="card">
    <h2 style="margin-top:0;">Active Rooms</h2>
    <ul id="room-list-ul"></ul>
    <button class="fab" onclick="showCreate()">+</button>
  </div>

  <div id="view-auth" class="card hidden">
    <h2 id="auth-title" style="margin-top:0;">Join Room</h2>
    <input type="text" id="username" placeholder="Your Username">
    <input type="text" id="roomName" placeholder="Room Name">
    <input type="password" id="password" placeholder="Room Password">
    <button class="btn-main" onclick="submitJoin()">Enter Room</button>
    <button class="btn-secondary" onclick="showList()">Cancel</button>
  </div>

  <div id="view-chat" class="card hidden">
    <div class="chat-header">
      <h3 id="room-display" style="color:#4dabf7; margin:0"></h3>
      <div class="header-btns">
        <button onclick="toggleSound()" id="sound-btn">🔊 On</button>
        <button onclick="leaveRoom()">🔙 Leave</button>
      </div>
    </div>
    <ul id="messages"></ul>
    <form id="chat-form" class="input-group">
      <input id="chat-input" autocomplete="off" placeholder="Message..."><button>Send</button>
    </form>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let isCreatingMode = false;
    let myCurrentUsername = "";
    let soundEnabled = true;

    // UI Elements
    const vList = document.getElementById('view-list');
    const vAuth = document.getElementById('view-auth');
    const vChat = document.getElementById('view-chat');
    const roomUl = document.getElementById('room-list-ul');

    // --- SOUND ENGINE (Web Audio API) ---
    function playNotificationSound() {
      if (!soundEnabled) return;
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gainNode = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, ctx.currentTime); 
        osc.connect(gainNode);
        gainNode.connect(ctx.destination);
        osc.start();
        gainNode.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.15);
        osc.stop(ctx.currentTime + 0.15);
      } catch (e) {
        console.log("Audio blocked by browser.");
      }
    }

    function toggleSound() {
      soundEnabled = !soundEnabled;
      document.getElementById('sound-btn').innerText = soundEnabled ? '🔊 On' : '🔇 Off';
    }
    // ------------------------------------

    // List Rooms
    socket.on('room-list', (rooms) => {
      roomUl.innerHTML = rooms.length ? '' : '<p style="color:#666">No active rooms right now.</p>';
      rooms.forEach(name => {
        const li = document.createElement('li');
        li.className = 'room-item';
        li.innerText = name;
        li.onclick = () => showJoin(name);
        roomUl.appendChild(li);
      });
    });

    // Navigation logic
    function showCreate() {
      isCreatingMode = true;
      document.getElementById('auth-title').innerText = "Create New Room";
      document.getElementById('roomName').disabled = false;
      document.getElementById('roomName').value = "";
      document.getElementById('password').value = "";
      switchView(vAuth);
    }

    function showJoin(name) {
      isCreatingMode = false;
      document.getElementById('auth-title').innerText = `Join ${name}`;
      document.getElementById('roomName').value = name;
      document.getElementById('roomName').disabled = true;
      document.getElementById('password').value = "";
      switchView(vAuth);
    }

    function showList() { switchView(vList); }

    function switchView(view) {
      [vList, vAuth, vChat].forEach(v => v.classList.add('hidden'));
      view.classList.remove('hidden');
    }

    // Join/Leave Logic
    function submitJoin() {
      const roomName = document.getElementById('roomName').value;
      const password = document.getElementById('password').value;
      const username = document.getElementById('username').value;
      if(!roomName || !password || !username) return alert("Please fill out all fields.");

      myCurrentUsername = username; 
      socket.emit('join-room', { roomName, password, username, isCreating: isCreatingMode });
    }

    function leaveRoom() {
      socket.emit('leave-room'); 
      document.getElementById('messages').innerHTML = ''; 
      switchView(vList); 
    }

    // Chat Logic
    socket.on('load history', (history) => {
      document.getElementById('room-display').innerText = document.getElementById('roomName').value;
      switchView(vChat);
      document.getElementById('messages').innerHTML = '';
      history.forEach(msg => addMessage(msg)); 
    });

    socket.on('error-msg', alert);

    document.getElementById('chat-form').onsubmit = (e) => {
      e.preventDefault();
      const input = document.getElementById('chat-input');
      if(input.value) {
        socket.emit('chat message', { text: input.value });
        input.value = '';
      }
    };

    socket.on('chat message', (data) => {
      // Play sound only if it is NOT our own message
      if (data.username !== myCurrentUsername) {
        playNotificationSound();
      }
      addMessage(data);
    });

    function addMessage(data) {
      const li = document.createElement('li');
      li.innerHTML = `<strong>${data.username}:</strong> ${data.text}`;
      const msgBox = document.getElementById('messages');
      msgBox.appendChild(li);
      msgBox.scrollTop = msgBox.scrollHeight;
    }
  </script>
</body>
</html>
