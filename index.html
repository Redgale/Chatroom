<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Lobby</title>
  <style>
    body { font-family: sans-serif; margin: 0; background: #0f0f0f; color: #e0e0e0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
    .card { width: 100%; max-width: 450px; background: #1a1a1a; padding: 20px; margin-top: 50px; border-radius: 12px; height: 80vh; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
    #room-list-ul { list-style: none; padding: 0; flex-grow: 1; overflow-y: auto; }
    .room-item { padding: 15px; background: #252525; margin-bottom: 10px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; }
    .room-item:hover { background: #333; border-color: #4dabf7; }
    .fab { position: absolute; bottom: 20px; right: 20px; width: 50px; height: 50px; background: #4dabf7; color: white; border: none; border-radius: 50%; font-size: 24px; cursor: pointer; }
    .chat-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 10px; }
    .header-btns button { padding: 6px 12px; font-size: 14px; margin-left: 5px; background: #333; color: white; border: none; border-radius: 4px; cursor: pointer; }
    #messages { flex-grow: 1; list-style: none; padding: 0; overflow-y: auto; margin-bottom: 15px; }
    #messages li { padding: 8px 0; border-bottom: 1px solid #252525; word-wrap: break-word; }
    #messages li strong { color: #4dabf7; margin-right: 5px; }
    .input-group { display: flex; gap: 10px; }
    input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #333; background: #252525; color: white; outline: none; }
    button { padding: 12px; background: #4dabf7; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    button:disabled { background: #444; color: #888; cursor: not-allowed; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="view-list" class="card">
    <h2 style="margin:0 0 10px 0">Active Rooms</h2>
    <ul id="room-list-ul"></ul>
    <button class="fab" onclick="showCreate()">+</button>
  </div>

  <div id="view-auth" class="card hidden">
    <h2 id="auth-title">Join Room</h2>
    <input type="text" id="username" placeholder="Your Username">
    <input type="text" id="roomName" placeholder="Room Name">
    <input type="password" id="password" placeholder="Room Password">
    <button style="width:100%; margin-bottom:10px" onclick="submitJoin()">Enter</button>
    <button style="width:100%; background:transparent" onclick="showList()">Cancel</button>
  </div>

  <div id="view-chat" class="card hidden">
    <div class="chat-header">
      <h3 id="room-display" style="color:#4dabf7; margin:0"></h3>
      <div class="header-btns">
        <button onclick="toggleSound()" id="sound-btn">🔊 On</button>
        <button onclick="leaveRoom()">🔙 Leave</button>
      </div>
    </div>
    <ul id="messages"></ul>
    <form id="chat-form" class="input-group">
      <input id="chat-input" autocomplete="off" placeholder="Message...">
      <button id="send-btn">Send</button>
    </form>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let isCreatingMode = false;
    let myCurrentUsername = "";
    let soundEnabled = true;

    // Sound Engine
    function playNotificationSound() {
      if (!soundEnabled) return;
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gainNode = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, ctx.currentTime);
        osc.connect(gainNode);
        gainNode.connect(ctx.destination);
        osc.start();
        gainNode.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.15);
        osc.stop(ctx.currentTime + 0.15);
      } catch (e) {}
    }

    function toggleSound() {
      soundEnabled = !soundEnabled;
      document.getElementById('sound-btn').innerText = soundEnabled ? '🔊 On' : '🔇 Off';
    }

    socket.on('room-list', (rooms) => {
      const roomUl = document.getElementById('room-list-ul');
      roomUl.innerHTML = rooms.length ? '' : '<p style="color:#666">No active rooms.</p>';
      rooms.forEach(name => {
        const li = document.createElement('li');
        li.className = 'room-item';
        li.innerText = name;
        li.onclick = () => showJoin(name);
        roomUl.appendChild(li);
      });
    });

    function showCreate() { isCreatingMode = true; document.getElementById('auth-title').innerText = "Create Room"; document.getElementById('roomName').disabled = false; switchView(document.getElementById('view-auth')); }
    function showJoin(name) { isCreatingMode = false; document.getElementById('auth-title').innerText = `Join ${name}`; document.getElementById('roomName').value = name; document.getElementById('roomName').disabled = true; switchView(document.getElementById('view-auth')); }
    function showList() { switchView(document.getElementById('view-list')); }

    function submitJoin() {
      const roomName = document.getElementById('roomName').value;
      const password = document.getElementById('password').value;
      const username = document.getElementById('username').value;
      if(!roomName || !password || !username) return alert("Fill all fields");
      myCurrentUsername = username;
      socket.emit('join-room', { roomName, password, username, isCreating: isCreatingMode });
    }

    function leaveRoom() { socket.emit('leave-room'); switchView(document.getElementById('view-list')); }

    socket.on('load history', (history) => {
      document.getElementById('room-display').innerText = document.getElementById('roomName').value;
      switchView(document.getElementById('view-chat'));
      const msgBox = document.getElementById('messages');
      msgBox.innerHTML = '';
      history.forEach(msg => addMessage(msg));
    });

    socket.on('error-msg', (err) => {
        alert(err);
        // If it's a rate limit error, the button will stay disabled by its own timer
    });

    document.getElementById('chat-form').onsubmit = (e) => {
      e.preventDefault();
      const input = document.getElementById('chat-input');
      const btn = document.getElementById('send-btn');
      
      if(input.value) {
        socket.emit('chat message', { text: input.value });
        input.value = '';

        // UI Cooldown logic
        btn.disabled = true;
        let timeLeft = 2;
        btn.innerText = timeLeft;
        const timer = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                clearInterval(timer);
                btn.disabled = false;
                btn.innerText = 'Send';
            } else {
                btn.innerText = timeLeft;
            }
        }, 1000);
      }
    };

    socket.on('chat message', (data) => {
      if (data.username !== myCurrentUsername) playNotificationSound();
      addMessage(data);
    });

    function addMessage(data) {
      const li = document.createElement('li');
      li.innerHTML = `<strong>${data.username}:</strong> ${data.text}`;
      const msgBox = document.getElementById('messages');
      msgBox.appendChild(li);
      msgBox.scrollTop = msgBox.scrollHeight;
    }

    function switchView(view) {
      [document.getElementById('view-list'), document.getElementById('view-auth'), document.getElementById('view-chat')].forEach(v => v.classList.add('hidden'));
      view.classList.remove('hidden');
    }
  </script>
</body>
</html>
