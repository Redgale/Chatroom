<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Chat</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: #0f0f0f; color: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; }
    #chat-container { display: none; width: 100%; max-width: 500px; height: 80vh; flex-direction: column; background: #1a1a1a; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    #messages { flex-grow: 1; list-style-type: none; margin: 0; padding: 20px; overflow-y: auto; border-bottom: 1px solid #333; }
    #messages li { margin-bottom: 12px; line-height: 1.4; border-bottom: 1px solid #252525; padding-bottom: 8px; }
    #messages li strong { color: #4dabf7; margin-right: 8px; }
    #form { display: flex; padding: 15px; background: #252525; }
    #input { flex-grow: 1; border: none; padding: 12px; border-radius: 6px; background: #333; color: white; outline: none; }
    button { background: #4dabf7; color: white; border: none; padding: 0 20px; margin-left: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    button:hover { background: #339af0; }
  </style>
</head>
<body>

  <div id="chat-container">
    <ul id="messages"></ul>
    <form id="form">
      <input id="input" autocomplete="off" placeholder="Say something..." /><button>Send</button>
    </form>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const correctPass = "therealdeer";
    let userPass = prompt("Secret Password:");

    if (userPass !== correctPass) {
      alert("Access Denied.");
      window.location.reload();
    } else {
      let username = prompt("Enter a username:") || "Guest";
      document.getElementById('chat-container').style.display = 'flex';

      // Tell the server we joined and check password for history
      socket.emit('join', { password: userPass });

      const form = document.getElementById('form');
      const input = document.getElementById('input');
      const messages = document.getElementById('messages');

      // Function to add a message to the UI
      const addMessage = (data) => {
        const item = document.createElement('li');
        item.innerHTML = `<strong>${data.username}</strong> ${data.text}`;
        messages.appendChild(item);
        messages.scrollTop = messages.scrollHeight;
      };

      // Handle loading the 100-message history
      socket.on('load history', (history) => {
        history.forEach(msg => addMessage(msg));
      });

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        if (input.value) {
          socket.emit('chat message', {
            password: userPass,
            username: username,
            text: input.value
          });
          input.value = '';
        }
      });

      // Handle new incoming messages
      socket.on('chat message', (data) => {
        addMessage(data);
      });
    }
  </script>
</body>
</html>
