<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room Engine</title>
  <style>
    body { font-family: sans-serif; margin: 0; background: #0f0f0f; color: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; }
    #lobby, #chat-container { width: 100%; max-width: 450px; background: #1a1a1a; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    #chat-container { display: none; height: 80vh; flex-direction: column; }
    input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; }
    #messages { flex-grow: 1; list-style: none; padding: 0; overflow-y: auto; margin-bottom: 15px; }
    #messages li { padding: 8px 0; border-bottom: 1px solid #252525; }
    #messages li strong { color: #4dabf7; margin-right: 8px; }
    button { width: 100%; padding: 12px; background: #4dabf7; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .chat-form { display: flex; }
    .chat-form input { margin-bottom: 0; margin-right: 10px; }
    .chat-form button { width: auto; }
  </style>
</head>
<body>

  <div id="lobby">
    <h2 style="margin-top:0">Join or Create Room</h2>
    <input type="text" id="roomInput" placeholder="Room Name">
    <input type="password" id="passInput" placeholder="Room Password">
    <input type="text" id="userInput" placeholder="Your Username">
    <button onclick="joinRoom()">Enter Room</button>
  </div>

  <div id="chat-container">
    <h3 id="roomTitle" style="margin-top:0; color:#4dabf7"></h3>
    <ul id="messages"></ul>
    <form id="form" class="chat-form">
      <input id="input" autocomplete="off" placeholder="Message..." /><button>Send</button>
    </form>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const lobby = document.getElementById('lobby');
    const chatContainer = document.getElementById('chat-container');
    const messages = document.getElementById('messages');

    function joinRoom() {
      const roomName = document.getElementById('roomInput').value;
      const password = document.getElementById('passInput').value;
      const username = document.getElementById('userInput').value;

      if (!roomName || !password || !username) return alert("Fill all fields");

      socket.emit('join-room', { roomName, password, username });
      document.getElementById('roomTitle').innerText = `Room: ${roomName}`;
    }

    socket.on('load history', (history) => {
      lobby.style.display = 'none';
      chatContainer.style.display = 'flex';
      messages.innerHTML = ''; // Clear for fresh load
      history.forEach(msg => addMessage(msg));
    });

    socket.on('error-msg', (msg) => alert(msg));

    socket.on('chat message', (data) => addMessage(data));

    document.getElementById('form').addEventListener('submit', (e) => {
      e.preventDefault();
      const input = document.getElementById('input');
      if (input.value) {
        socket.emit('chat message', { text: input.value });
        input.value = '';
      }
    });

    function addMessage(data) {
      const item = document.createElement('li');
      item.innerHTML = `<strong>${data.username}</strong> ${data.text}`;
      messages.appendChild(item);
      messages.scrollTop = messages.scrollHeight;
    }
  </script>
</body>
</html>
